<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>김은율</title>
    <style>
        
        .area1 {
            background-color: lightblue;
            font-family: "궁서";
            padding-top: 20px;
            padding-bottom: 20px;
            padding-left: 20px;
            padding-right: 20px;
            text-align: center;
        }

        
        .area2 {
            margin-top: 10px;
            margin-bottom: 10px;
        }
        .area2 img {
            box-shadow: 5px 5px 10px gray;
        }
        .area2 p {
            text-shadow: 2px 2px 5px gray;
        }

        .area3 {
            border: 1px solid black;
            padding: 15px;
        }
        .area3 input:hover {
            cursor: pointer;
        }
        .area3 button:hover {
            cursor: pointer;
        }
        .area3 select:hover {
            cursor: pointer;
        }

        .area4 {
            border-width: 3px;
            border-style: solid;
            border-color: blue;
            border-radius: 20px;
            background-color: lightyellow;
            box-shadow: 5px 5px 10px gray;
            padding: 20px;
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <main>

        <div class="area1">
            <img src="https://lovepik.com" width="100" height="100">
        </div>

        
        <div class="area2">
            <details>
                <summary>더보기 클릭</summary>
                <p>상세 내용이 여기에 들어갑니다.</p>
            </details>
        </div>

        
        <div class="area3">
            <form>
                <label>텍스트 입력: </label>
                <input type="text">
                <br>
                <label>날짜 선택: </label>
                <input type="date">
                <br>
                <button type="button">확인 버튼</button>
                <br>
                <label>숫자 입력: </label>
                <input type="number">
                <br>
                <label>라디오 버튼: </label>
                <input type="radio" name="select">항목1
                <input type="radio" name="select">항목2
                <input type="radio" name="select">항목3
                <br>
                <label>체크박스: </label>
                <input type="checkbox">체크1
                <input type="checkbox">체크2
                <input type="checkbox">체크3
                <br>
                <label>목록 선택: </label>
                <select>
                    <option>선택하세요</option>
                    <option>옵션 1</option>
                    <option>옵션 2</option>
                    <option>옵션 3</option>
                </select>
            </form>
        </div>

        
        <div class="area4">
            <p>박스 영역 안에 있는 텍스트입니다.</p>
        </div>
    </main>
</body>
</html>
