<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>저녁메뉴</title>
    <style>
    
        h3 {
            text-align: center;
            color: red;
        }
        
        hr {
            border: 0.5px solid lightgrey;
        }
        /* 리스트 스타일: 글자 크기 및 색상 */
        ul {
            list-style-type: none; /* 점 없애기 */
            padding-left: 20px;
            color: #333;
        }
        li {
            margin-bottom: 5px;
        }
    </style>
</head>
<body>

    <h3>저녁메뉴</h3>
    <hr>
    
    <p>
        짜장 돈욱
        <span>기억안남</span>
    </p>

</body>
</html>
