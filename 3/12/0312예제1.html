<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
<!-- div: 한 줄을 통째로 차지 (블록) -->
<div style="background-color: lightblue; margin-bottom: 10px;">
  [div] 저는 한 줄을 다 써요. 레이아웃을 잡을 때 좋죠!
</div>

<!-- p: 문단 구분 (위아래 여백이 생김) -->
<p style="background-color: lightgreen;">
  [p] 저는 문단이에요. 위아래로 약간의 여백이 자동으로 생깁니다.
</p>

<!-- span: 글자 내용만큼만 차지 (인라인) -->
<p>
  문장 안에서 <span style="background-color: yellow; font-weight: bold;">[span] 특정 단어만 노란색</span>으로 강조할 때 써요. 줄바꿈이 없죠?
</p>

</body>
</html>
